<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BVLTNE Artist</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{

    font-family:Arial,sans-serif;

    max-width:900px;

    margin:auto;

    padding:40px;

}

input{

    width:300px;

    padding:10px;

}

button{

    padding:10px 20px;

    margin-left:10px;

}

audio{

    width:100%;

    margin-top:10px;

}

pre{

    white-space:pre-wrap;

    background:#f4f4f4;

    padding:15px;

    border-radius:8px;

}

</style>

</head>

<body>

<h1>BVLTNE Artist</h1>

<hr>

<h3>Session</h3>

<input
id="sessionInput"
placeholder="Session Name">

<button id="loadBtn">

Load Session

</button>

<hr>

<h3>Lyrics</h3>

<pre id="lyrics"></pre>

<hr>

<h3>Instrumental</h3>

<audio
id="instrumentalPlayer"
controls>
</audio>

<hr>

<h3>Guide</h3>

<audio
id="guidePlayer"
controls>
</audio>

<script src="artist.js"></script>

</body>

</html>
